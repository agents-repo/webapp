name: Feature proposal
description: Propose a new capability or UX improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `feat/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `feat/89-search-refinement`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or product problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or UX.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Include technical, design, or workflow constraints.
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which checks should pass for this feature (`env:check`, `lint:all`, `typecheck`, `build`)?
