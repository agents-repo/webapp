name: Spec change
description: Propose a normative behavior, contract, or workflow rule change.
title: "spec: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `spec/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `spec/57-pr-policy-clarity`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What gap, inconsistency, or requirement drives this change?
    validations:
      required: true
  - type: textarea
    id: proposed-rule
    attributes:
      label: Proposed rule
      description: Describe the normative rule change and expected behavior.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impacted docs and workflows
      description: List files or workflows that must be updated together.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which checks should pass for this change?
