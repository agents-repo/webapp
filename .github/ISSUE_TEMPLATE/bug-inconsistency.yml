name: Bug or inconsistency
description: Report a defect or behavior inconsistency in the webapp.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `fix/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `fix/42-related-issues-checklist`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation context
      description: Include affected environment, screenshots, or logs if relevant.
  - type: textarea
    id: related
    attributes:
      label: Related paths
      description: List relevant webapp files or folders (for example `src/`, `docs/`, `.github/`).
