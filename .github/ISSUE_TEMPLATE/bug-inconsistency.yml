name: Bug or inconsistency
description: Report a defect or behavior inconsistency in the webapp.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        **Branch name:** `fix/<issue-number>-<short-slug>`
        **Example:** `fix/42-related-issues-checklist`

        Create this issue first to obtain the issue number, then open the branch.

        You MUST open a draft pull request targeting `main` before implementation
        commits (`gh pr create --draft`). The developer manually marks the PR
        ready for review after validation. Include `Closes #<issue-number>` in `## Related Issues`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation context
      description: Include affected environment, screenshots, or logs if relevant.
  - type: textarea
    id: related
    attributes:
      label: Related paths
      description: List relevant webapp files or folders (for example `src/`, `docs/`, `.github/`).
