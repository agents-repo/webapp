name: Task
description: Track a scoped engineering or documentation task.
title: "task: "
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be completed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions for completion.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which commands or checks should pass?
