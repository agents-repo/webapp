name: Task or chore
description: Track a scoped engineering or documentation task.
title: "chore: "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        Use this form for task/chore work. Documentation-only work should use
        this issue form and a `docs/<issue-number>-<slug>` branch.

        **Branch name:** `chore/<issue-number>-<short-slug>`
        **Example:** `chore/31-sync-workflow-docs`

        Create this issue first to obtain the issue number, then open the branch.

        You MUST open a draft pull request targeting `main` before implementation
        commits (`gh pr create --draft`). The developer manually marks the PR
        ready for review after validation. Include `Closes #<issue-number>` in `## Related Issues`.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be completed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions for completion.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which commands or checks should pass?
