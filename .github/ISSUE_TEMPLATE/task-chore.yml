name: Task or chore
description: Track a scoped engineering or documentation task.
title: "chore: "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        Use this form for task/chore work. Documentation-only work should use
        a `docs/<issue-number>-<slug>` branch.

        **Branch pattern:** `chore/<issue-number>-<slug>` (or
        `docs/<issue-number>-<slug>` for documentation-only work)

        **Example:** `chore/31-sync-workflow-docs` or `docs/88-update-pr-guidance`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be completed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions for completion.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which commands or checks should pass?
