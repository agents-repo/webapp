name: Task or chore
description: Track a scoped engineering or documentation task.
title: "chore: "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        Use this form for task/chore work. Documentation-only work should
        use this issue form and a `docs/<issue-number>-<slug>` branch.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be completed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions for completion.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which commands or checks should pass?
