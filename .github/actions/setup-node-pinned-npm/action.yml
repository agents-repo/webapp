# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup Node and pinned npm
description: Setup Node from .nvmrc, activate pinned npm via Corepack, and install dependencies.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Activate pinned npm
      shell: bash
      run: |
        corepack enable npm
        PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
        case "$PACKAGE_MANAGER" in
          npm@*) ;;
          *)
            echo "Expected package.json packageManager to start with 'npm@', got: $PACKAGE_MANAGER" >&2
            exit 1
            ;;
        esac
        corepack prepare "$PACKAGE_MANAGER" --activate
        PINNED_NPM_VERSION="${PACKAGE_MANAGER#npm@}"
        PINNED_NPM_VERSION="${PINNED_NPM_VERSION%%+*}"
        ACTUAL_NPM_VERSION="$(npm --version)"
        echo "Activated npm ${ACTUAL_NPM_VERSION}"
        if [ "$ACTUAL_NPM_VERSION" != "$PINNED_NPM_VERSION" ]; then
          echo "Expected npm ${PINNED_NPM_VERSION}, found ${ACTUAL_NPM_VERSION}" >&2
          exit 1
        fi

    - name: Install dependencies
      shell: bash
      run: npm ci
