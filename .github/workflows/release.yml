name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run Markdown and code lint
        run: npm run lint:all

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build for Pages
        run: npm run build:pages

  release-dry-run:
    name: Release Dry Run
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Run semantic-release (dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

  release-publish:
    name: Publish GitHub Release
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - validate
    outputs:
      published: ${{ steps.release.outputs.published }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Set release outputs
        id: release
        run: |
          if [ -f "$RUNNER_TEMP/release-tag.txt" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$(tr -d '\n' < "$RUNNER_TEMP/release-tag.txt")" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: release-publish
    if: needs.release-publish.outputs.published == 'true'
    uses: ./.github/workflows/pages-deploy.yml
    with:
      tag: ${{ needs.release-publish.outputs.tag }}
    secrets: inherit
