name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run Markdown and code lint
        run: npm run lint:all

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build for Pages
        run: npm run build:pages

  release-dry-run:
    name: Release Dry Run
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Run semantic-release (dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

  release-publish:
    name: Publish GitHub Release
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Set release outputs
        id: release
        run: |
          git fetch --tags origin
          TAG=$(git tag -l 'v*' --points-at HEAD | sort -V | tail -1)
          if [ -n "$TAG" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build for Pages
        if: steps.release.outputs.published == 'true'
        run: npm run build:pages

      - name: Deploy to agents-repo.github.io
        if: steps.release.outputs.published == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: agents-repo/agents-repo.github.io
          publish_branch: main
          publish_dir: ./dist
          keep_files: true
          commit_message: "deploy: webapp ${{ steps.release.outputs.tag }}"
