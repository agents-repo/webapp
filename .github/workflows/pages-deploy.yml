name: Pages Deploy

# release: published does not fire for GITHUB_TOKEN semantic-release releases.
# This trigger supports manually created releases and external automation only.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to redeploy (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    if: >-
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v')) ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 1

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run Markdown and code lint
        run: npm run lint:all

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build for Pages
        run: npm run build:pages

      - name: Verify crawl files
        run: npm run test:crawl-files

      - name: Assert production crawl origin
        run: npm run assert:production-crawl-origin

      - name: Deploy to agents-repo.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: agents-repo/agents-repo.github.io
          publish_branch: main
          publish_dir: ./dist
          keep_files: true
          cname: agents-repo.org
          commit_message: "deploy: webapp ${{ steps.release.outputs.tag }}"
