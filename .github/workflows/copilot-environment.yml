name: Copilot Environment Preflight

on:
  workflow_dispatch:
  workflow_call:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Validate runtime
        run: npm run env:check

      - name: Run Markdown and code lint
        run: npm run lint:all

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
