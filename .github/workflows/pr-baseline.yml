name: PR Baseline Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run Markdown and code lint
        run: npm run lint:all

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build for Pages
        run: npm run build:pages

      - name: Accessibility scan (Lighthouse + pa11y)
        run: npm run a11y:ci
